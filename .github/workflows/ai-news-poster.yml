name: AI News Content Generator

on:
  schedule:
    # 日本時間 毎朝6時（UTC 21時・前日）に実行
    - cron: "0 21 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # daily-content/ をコミットするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's content
        run: python main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit and push daily-content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-content/
          # 変更がなければスキップ（冪等性）
          git diff --cached --quiet && echo "変更なし" && exit 0
          git commit -m "content: $(date +'%Y-%m-%d') の投稿コンテンツを生成"
          git push
