name: AI News Content Generator

on:
  schedule:
    # 日本時間 毎朝6時（UTC 21時・前日）に実行
    - cron: "0 21 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # daily-content/ をコミットするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's content
        run: python main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit and push daily-content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-content/
          git diff --cached --quiet && echo "変更なし" && exit 0
          git commit -m "content: $(date +'%Y-%m-%d') の投稿コンテンツを生成"
          git pull --rebase origin main
          git push

      - name: Notify Slack
        run: |
          TODAY=$(TZ=Asia/Tokyo date '+%Y-%m-%d')
          JSON_FILE="daily-content/${TODAY}.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo "JSONファイルが見つかりません: $JSON_FILE"
            exit 0
          fi

          CAPTION=$(python3 -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d['caption'])")
          SOURCE_URL=$(python3 -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d.get('source_url',''))")
          HAS_IMAGE=$(python3 -c "import json,sys; d=json.load(open('$JSON_FILE')); print('yes' if d.get('image') else 'no')")
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/daily-content/${TODAY}.png"

          # Slackメッセージ組み立て
          PAYLOAD=$(python3 -c "
          import json, sys
          caption = sys.argv[1]
          source_url = sys.argv[2]
          has_image = sys.argv[3]
          image_url = sys.argv[4]
          today = sys.argv[5]

          blocks = [
            {'type': 'header', 'text': {'type': 'plain_text', 'text': f'{today} の投稿候補'}},
            {'type': 'section', 'text': {'type': 'mrkdwn', 'text': '*投稿文*\n' + caption}},
            {'type': 'section', 'text': {'type': 'mrkdwn', 'text': '*元記事*\n' + source_url}},
          ]
          if has_image == 'yes':
            blocks.append({'type': 'image', 'image_url': image_url, 'alt_text': '図解画像'})
          blocks.append({'type': 'context', 'elements': [{'type': 'mrkdwn', 'text': '確認後、Xに手動投稿してください'}]})
          print(json.dumps({'blocks': blocks}))
          " "$CAPTION" "$SOURCE_URL" "$HAS_IMAGE" "$IMAGE_URL" "$TODAY")

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
